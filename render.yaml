services:
  - type: web
    name: languageplatform-backend
    runtime: docker
    rootDir: BACKEND
    envVars:
      - key: PORT
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
