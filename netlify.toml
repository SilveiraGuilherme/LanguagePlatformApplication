[build]
publish = "FRONTEND"
command = "if [ -n \"$API_BASE_URL\" ]; then sed -i \"s|__API_BASE_URL__|$API_BASE_URL|g\" FRONTEND/assets/js/main.js && echo 'Injected API_BASE_URL into main.js'; else echo 'API_BASE_URL not set; using localhost fallback'; fi"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Environment variables
# Set on Netlify UI: Settings > Build & deploy > Environment > Environment variables
# API_BASE_URL = your Render backend URL (e.g., https://languageplatformbackend.onrender.com)
